<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocab Flashcards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f5f4f0;
      --bg3: #eeede9;
      --text: #1a1a1a;
      --text2: #666;
      --text3: #999;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.2);
      --radius: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --bg2: #2a2a2a;
        --bg3: #333;
        --text: #f0f0f0;
        --text2: #aaa;
        --text3: #666;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.2);
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }
    .app {
      max-width: 560px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 8px;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .import-btn {
      font-size: 13px;
      padding: 7px 14px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text2);
      cursor: pointer;
      transition: background 0.15s;
    }
    .import-btn:hover { background: var(--bg2); }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
      border: 0.5px solid var(--border);
    }
    .stat-num { font-size: 22px; font-weight: 600; }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }

    .mode-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .mode-btn {
      flex: 1;
      padding: 9px 6px;
      font-size: 13px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active { background: #26215C; border-color: #26215C; color: white; }
    .mode-btn:hover:not(.active) { background: var(--bg2); }
    .mode-btn .count { font-size: 11px; display: block; opacity: 0.75; margin-top: 1px; }

    .topic-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .topic-btn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .topic-btn.active { background: #E6F1FB; border-color: #378ADD; color: #185FA5; font-weight: 500; }
    .topic-btn:hover:not(.active) { background: var(--bg2); }

    .card-area { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }

    .progress-line { width: 100%; display: flex; align-items: center; gap: 10px; }
    .progress-bar { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #378ADD; border-radius: 2px; transition: width 0.3s; }
    .progress-label { font-size: 12px; color: var(--text2); white-space: nowrap; }

    .card-wrap { width: 100%; perspective: 1000px; height: 250px; cursor: pointer; }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    }
    .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      user-select: none;
    }
    .card-back { transform: rotateY(180deg); background: var(--bg2); }
    .card-tag { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
    .card-word { font-size: 30px; font-weight: 600; margin-bottom: 8px; }
    .card-phonetic { font-size: 14px; color: var(--text2); margin-bottom: 8px; }
    .card-hint { font-size: 12px; color: var(--text3); margin-top: 14px; }
    .card-translation { font-size: 24px; font-weight: 600; margin-bottom: 10px; }
    .card-example { font-size: 13px; color: var(--text2); font-style: italic; max-width: 340px; line-height: 1.6; }

    .card-type {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      margin-bottom: 14px;
      font-weight: 500;
    }
    .type-noun { background: #E1F5EE; color: #0F6E56; }
    .type-verb { background: #E6F1FB; color: #185FA5; }
    .type-adj  { background: #FAEEDA; color: #854F0B; }
    .type-adv  { background: #FBEAF0; color: #993556; }
    .type-phrase { background: #EEEDFE; color: #534AB7; }

    .status-icon {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: absolute; top: 12px; right: 12px;
      font-size: 11px; font-weight: 600;
    }
    .status-known { background: #EAF3DE; color: #3B6D11; }
    .status-hard  { background: #FAECE7; color: #993C1D; }

    .action-btns-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
    .reveal-btn {
      width: 100%;
      padding: 11px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: var(--bg2);
      color: var(--text2);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .reveal-btn:hover { background: var(--bg); }

    .action-row { display: flex; gap: 10px; width: 100%; }
    .action-btn {
      flex: 1;
      padding: 11px 6px;
      border-radius: var(--radius);
      border: 0.5px solid transparent;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .action-btn:hover { transform: translateY(-2px); }
    .btn-no   { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
    .btn-hard { background: #FAEEDA; border-color: #FAC775; color: #854F0B; }
    .btn-yes  { background: #EAF3DE; border-color: #C0DD97; color: #3B6D11; }
    .btn-label { font-size: 11px; opacity: 0.8; font-weight: 400; }

    .nav-row { display: flex; justify-content: space-between; width: 100%; }
    .nav-btn {
      font-size: 13px;
      padding: 7px 16px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text2);
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-btn:hover:not(:disabled) { background: var(--bg2); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; line-height: 1.8; }
    .empty-state .big { font-size: 36px; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Vocab Flashcards</h1>
    <label class="import-btn">+ Importar JSON
      <input type="file" accept=".json" id="file-input" style="display:none">
    </label>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#3B6D11" id="s-known">0</div><div class="stat-label">Sabidas</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#A32D2D" id="s-hard">0</div><div class="stat-label">Por repasar</div></div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="all" onclick="setMode('all')">Estudiar todo<span class="count" id="mc-all"></span></button>
    <button class="mode-btn" data-mode="hard" onclick="setMode('hard')">Solo fallos<span class="count" id="mc-hard"></span></button>
    <button class="mode-btn" data-mode="review" onclick="setMode('review')">Repaso<span class="count" id="mc-review"></span></button>
  </div>

  <div class="topic-bar" id="topic-bar"></div>
  <div class="card-area" id="card-area">
    <div class="empty-state">
      <div class="big">📚</div>
      Importa un JSON con tu vocabulario para empezar.<br>
      <small style="color:#999">O edita el archivo y añade tus palabras directamente.</small>
    </div>
  </div>
</div>

<script>
const SAMPLE = {
  "vocabulary": [
    {"word":"accomplish","translation":"lograr / conseguir","type":"verb","phonetic":"/əˈkɒmplɪʃ/","example":"She accomplished her goals ahead of schedule.","topic":"Trabajo"},
    {"word":"resilient","translation":"resistente / resiliente","type":"adj","phonetic":"/rɪˈzɪliənt/","example":"You need to be resilient in difficult times.","topic":"Personalidad"},
    {"word":"therefore","translation":"por lo tanto","type":"adv","phonetic":"/ˈðeəfɔː/","example":"The road was icy; therefore, we drove slowly.","topic":"Conectores"},
    {"word":"appointment","translation":"cita / reunión","type":"noun","phonetic":"/əˈpɔɪntmənt/","example":"I have a doctor's appointment at 3 pm.","topic":"Trabajo"},
    {"word":"moreover","translation":"además / es más","type":"adv","phonetic":"/mɔːˈrəʊvə/","example":"Moreover, the results were unexpected.","topic":"Conectores"},
    {"word":"endeavour","translation":"esfuerzo / intentar","type":"noun","phonetic":"/ɪnˈdevə/","example":"It was a great endeavour to climb the mountain.","topic":"Personalidad"},
    {"word":"straightforward","translation":"sencillo / directo","type":"adj","phonetic":"/ˌstreɪtˈfɔːwəd/","example":"The instructions are quite straightforward.","topic":"Personalidad"},
    {"word":"deadline","translation":"fecha límite","type":"noun","phonetic":"/ˈdedlaɪn/","example":"We need to meet the project deadline.","topic":"Trabajo"},
    {"word":"nevertheless","translation":"sin embargo / no obstante","type":"adv","phonetic":"/ˌnevəðəˈles/","example":"It was raining; nevertheless, we went out.","topic":"Conectores"},
    {"word":"acknowledge","translation":"reconocer / agradecer","type":"verb","phonetic":"/əkˈnɒlɪdʒ/","example":"He acknowledged her contribution to the project.","topic":"Trabajo"},
    {"word":"compelling","translation":"convincente / fascinante","type":"adj","phonetic":"/kəmˈpelɪŋ/","example":"She gave a compelling argument.","topic":"Personalidad"},
    {"word":"outcome","translation":"resultado / desenlace","type":"noun","phonetic":"/ˈaʊtkʌm/","example":"The outcome of the experiment was surprising.","topic":"Trabajo"}
  ]
};

let vocab = [], progress = {}, currentDeck = [], currentIdx = 0, currentMode = 'all', currentTopic = 'all', flipped = false;

function loadProgress() { try { progress = JSON.parse(localStorage.getItem('vocab_progress') || '{}'); } catch(e) { progress = {}; } }
function saveProgress() { try { localStorage.setItem('vocab_progress', JSON.stringify(progress)); } catch(e) {} }

function loadData(data) {
  vocab = data.vocabulary || (Array.isArray(data) ? data : []);
  buildTopics(); updateDeck(); updateStats();
}

function buildTopics() {
  const topics = ['all', ...new Set(vocab.map(v => v.topic).filter(Boolean))];
  document.getElementById('topic-bar').innerHTML = topics.map(t =>
    `<button class="topic-btn${t===currentTopic?' active':''}" onclick="setTopic('${t}')">${t==='all'?'Todos':t}</button>`
  ).join('');
}

function setTopic(t) { currentTopic = t; buildTopics(); updateDeck(); }
function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode===m));
  updateDeck();
}

function filteredVocab() {
  return vocab.filter(v => currentTopic === 'all' || v.topic === currentTopic);
}

function updateDeck() {
  const base = filteredVocab();
  if (currentMode === 'hard') currentDeck = base.filter(v => progress[v.word]==='hard' || progress[v.word]==='no');
  else if (currentMode === 'review') currentDeck = base.filter(v => progress[v.word]==='known');
  else currentDeck = [...base].sort((a,b) => ({no:0,hard:1,undefined:2,known:3}[progress[a.word]]??2) - ({no:0,hard:1,undefined:2,known:3}[progress[b.word]]??2));
  currentIdx = 0; flipped = false;
  updateModeCounts(); renderCard();
}

function updateModeCounts() {
  const base = filteredVocab();
  document.getElementById('mc-all').textContent = base.length + ' cards';
  document.getElementById('mc-hard').textContent = base.filter(v=>progress[v.word]==='hard'||progress[v.word]==='no').length + ' cards';
  document.getElementById('mc-review').textContent = base.filter(v=>progress[v.word]==='known').length + ' cards';
}

function updateStats() {
  document.getElementById('s-total').textContent = vocab.length;
  document.getElementById('s-known').textContent = Object.values(progress).filter(v=>v==='known').length;
  document.getElementById('s-hard').textContent = Object.values(progress).filter(v=>v==='hard'||v==='no').length;
}

function typeClass(t) { return ({verb:'type-verb',noun:'type-noun',adj:'type-adj',adv:'type-adv',phrase:'type-phrase'}[t]||'type-noun'); }
function typeName(t) { return ({verb:'verbo',noun:'sustantivo',adj:'adjetivo',adv:'adverbio',phrase:'frase'}[t]||t||''); }
function statusIcon(w) {
  const s = progress[w];
  if (s==='known') return '<div class="status-icon status-known">✓</div>';
  if (s==='hard'||s==='no') return '<div class="status-icon status-hard">!</div>';
  return '';
}

function renderCard() {
  const area = document.getElementById('card-area');
  if (!currentDeck.length) {
    const msgs = {hard:'No tienes palabras marcadas como difíciles 🎉',review:'Aún no has acertado ninguna. ¡Ánimo!',all:'Importa un JSON con tu vocabulario para empezar.'};
    area.innerHTML = `<div class="empty-state"><div class="big">${currentMode==='hard'?'🎉':'📚'}</div>${msgs[currentMode]}</div>`;
    return;
  }
  const card = currentDeck[currentIdx];
  const pct = Math.round((currentIdx / currentDeck.length) * 100);
  area.innerHTML = `
    <div class="progress-line">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${currentIdx+1} / ${currentDeck.length}</span>
    </div>
    <div class="card-wrap" id="the-card" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-face">
          ${statusIcon(card.word)}
          <div class="card-tag">${card.topic||''}</div>
          <div class="card-word">${card.word}</div>
          ${card.phonetic?`<div class="card-phonetic">${card.phonetic}</div>`:''}
          <div class="card-hint">Toca para ver la traducción</div>
        </div>
        <div class="card-face card-back">
          ${statusIcon(card.word)}
          <span class="card-type ${typeClass(card.type)}">${typeName(card.type)}</span>
          <div class="card-translation">${card.translation}</div>
          ${card.example?`<div class="card-example">"${card.example}"</div>`:''}
        </div>
      </div>
    </div>
    <div class="action-btns-wrap" id="action-area">
      <button class="reveal-btn" onclick="flipCard()">Ver traducción</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()" ${currentIdx===0?'disabled':''}>← Anterior</button>
      <button class="nav-btn" onclick="nextCard()" ${currentIdx===currentDeck.length-1?'disabled':''}>Siguiente →</button>
    </div>`;
}

function flipCard() {
  const wrap = document.getElementById('the-card');
  if (!wrap) return;
  flipped = !flipped;
  wrap.classList.toggle('flipped', flipped);
  document.getElementById('action-area').innerHTML = flipped
    ? `<div class="action-row">
        <button class="action-btn btn-no" onclick="rate('no')">✗<span class="btn-label">No sé</span></button>
        <button class="action-btn btn-hard" onclick="rate('hard')">~<span class="btn-label">Difícil</span></button>
        <button class="action-btn btn-yes" onclick="rate('known')">✓<span class="btn-label">Lo sé</span></button>
       </div>`
    : `<button class="reveal-btn" onclick="flipCard()">Ver traducción</button>`;
}

function rate(val) {
  progress[currentDeck[currentIdx].word] = val;
  saveProgress(); updateStats(); updateModeCounts();
  setTimeout(() => {
    if (currentIdx < currentDeck.length - 1) { currentIdx++; flipped = false; renderCard(); }
    else {
      document.getElementById('card-area').innerHTML = `<div class="empty-state"><div class="big">🎯</div><b>¡Ronda completada!</b><br><br>
        <button class="nav-btn" style="margin:0 auto;display:block;padding:10px 24px" onclick="updateDeck()">Repetir</button></div>`;
    }
    if (currentMode==='hard') updateDeck();
  }, 200);
}

function nextCard() { if (currentIdx < currentDeck.length-1) { currentIdx++; flipped=false; renderCard(); } }
function prevCard() { if (currentIdx > 0) { currentIdx--; flipped=false; renderCard(); } }

document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { try { loadData(JSON.parse(ev.target.result)); } catch(err) { alert('JSON inválido — revisa el formato.'); } };
  r.readAsText(f); e.target.value = '';
});

loadProgress();
loadData(SAMPLE);
</script>
</body>
</html>
