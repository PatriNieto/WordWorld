<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocab Flashcards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f5f4f0;
      --bg3: #eeede9;
      --text: #1a1a1a;
      --text2: #666;
      --text3: #999;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.2);
      --radius: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #333;
        --text: #f0f0f0; --text2: #aaa; --text3: #666;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.2);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
    .app { max-width: 560px; margin: 0 auto; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header-btns { display: flex; gap: 8px; }
    .icon-btn { font-size: 13px; padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .icon-btn:hover { background: var(--bg2); }
    .icon-btn.danger { color: #A32D2D; border-color: #F09595; }
    .icon-btn.danger:hover { background: #FCEBEB; }

    .global-stats { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 1.5rem; }
    .global-stats-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .global-progress-bar { width: 100%; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; display: flex; gap: 1px; margin-bottom: 8px; }
    .gp-known { background: #639922; transition: width 0.4s; }
    .gp-hard  { background: #EF9F27; transition: width 0.4s; }
    .gp-no    { background: #E24B4A; transition: width 0.4s; }
    .gp-new   { background: var(--bg3); flex: 1; }
    .global-stats-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .gstat { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .gstat-dot { width: 8px; height: 8px; border-radius: 50%; }
    .gstat-num { font-weight: 600; color: var(--text); }

    .mode-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
    .mode-btn { flex: 1; padding: 9px 6px; font-size: 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; line-height: 1.3; }
    .mode-btn.active { background: #26215C; border-color: #26215C; color: white; }
    .mode-btn:hover:not(.active) { background: var(--bg2); }
    .mode-btn .count { font-size: 11px; display: block; opacity: 0.7; margin-top: 2px; }

    .topic-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .topic-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; }
    .topic-btn.active { background: #E6F1FB; border-color: #378ADD; color: #185FA5; font-weight: 500; }
    .topic-btn:hover:not(.active) { background: var(--bg2); }

    .card-area { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .progress-line { width: 100%; display: flex; align-items: center; gap: 10px; }
    .progress-bar { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #378ADD; border-radius: 2px; transition: width 0.3s; }
    .progress-label { font-size: 12px; color: var(--text2); white-space: nowrap; }

    .card-wrap { width: 100%; perspective: 1000px; height: 250px; cursor: pointer; }
    .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(.4,0,.2,1); }
    .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
    .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius-lg); border: 0.5px solid var(--border); background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; user-select: none; }
    .card-back { transform: rotateY(180deg); background: var(--bg2); }
    .card-tag { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
    .card-word { font-size: 30px; font-weight: 600; margin-bottom: 8px; }
    .card-phonetic { font-size: 14px; color: var(--text2); margin-bottom: 8px; }
    .card-hint { font-size: 12px; color: var(--text3); margin-top: 14px; }
    .card-translation { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
    .card-example { font-size: 13px; color: var(--text2); font-style: italic; max-width: 340px; line-height: 1.6; }
    .card-type { font-size: 11px; padding: 3px 10px; border-radius: 12px; margin-bottom: 14px; font-weight: 500; }
    .type-noun { background: #E1F5EE; color: #0F6E56; }
    .type-verb { background: #E6F1FB; color: #185FA5; }
    .type-adj  { background: #FAEEDA; color: #854F0B; }
    .type-adv  { background: #FBEAF0; color: #993556; }
    .type-phrase { background: #EEEDFE; color: #534AB7; }

    .status-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: 12px; right: 12px; font-size: 11px; font-weight: 600; }
    .status-known { background: #EAF3DE; color: #3B6D11; }
    .status-hard  { background: #FAEEDA; color: #854F0B; }
    .status-no    { background: #FCEBEB; color: #A32D2D; }

    .action-btns-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
    .reveal-btn { width: 100%; padding: 11px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 14px; cursor: pointer; transition: background 0.15s; }
    .reveal-btn:hover { background: var(--bg); }
    .action-row { display: flex; gap: 10px; width: 100%; }
    .action-btn { flex: 1; padding: 11px 6px; border-radius: var(--radius); border: 0.5px solid transparent; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .action-btn:hover { transform: translateY(-2px); }
    .btn-no   { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
    .btn-hard { background: #FAEEDA; border-color: #FAC775; color: #854F0B; }
    .btn-yes  { background: #EAF3DE; border-color: #C0DD97; color: #3B6D11; }
    .btn-label { font-size: 11px; opacity: 0.8; font-weight: 400; }

    .nav-row { display: flex; justify-content: space-between; width: 100%; }
    .nav-btn { font-size: 13px; padding: 7px 16px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; transition: background 0.15s; }
    .nav-btn:hover:not(:disabled) { background: var(--bg2); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; line-height: 1.8; }
    .empty-state .big { font-size: 36px; margin-bottom: 1rem; }

    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; font-size: 13px; padding: 8px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Vocab Flashcards</h1>
    <div class="header-btns">
      <label class="icon-btn">+ JSON <input type="file" accept=".json" id="file-input" style="display:none"></label>
      <button class="icon-btn danger" onclick="confirmReset()">↺ Reset</button>
    </div>
  </div>

  <div class="global-stats" id="global-stats">
    <div class="global-stats-title">Progreso global</div>
    <div class="global-progress-bar" id="gp-bar">
      <div class="gp-known" id="gp-known" style="width:0%"></div>
      <div class="gp-hard"  id="gp-hard"  style="width:0%"></div>
      <div class="gp-no"    id="gp-no"    style="width:0%"></div>
    </div>
    <div class="global-stats-row">
      <div class="gstat"><div class="gstat-dot" style="background:#639922"></div><span class="gstat-num" id="g-known">0</span> sabidas</div>
      <div class="gstat"><div class="gstat-dot" style="background:#EF9F27"></div><span class="gstat-num" id="g-hard">0</span> difíciles</div>
      <div class="gstat"><div class="gstat-dot" style="background:#E24B4A"></div><span class="gstat-num" id="g-no">0</span> no sé</div>
      <div class="gstat"><div class="gstat-dot" style="background:var(--bg3); border: 1px solid var(--border2)"></div><span class="gstat-num" id="g-new">0</span> nuevas</div>
      <div class="gstat" style="margin-left:auto"><span class="gstat-num" id="g-total">0</span> total</div>
    </div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="all"    onclick="setMode('all')">Estudiar todo<span class="count" id="mc-all"></span></button>
    <button class="mode-btn"        data-mode="hard"   onclick="setMode('hard')">Fallos<span class="count" id="mc-hard"></span></button>
    <button class="mode-btn"        data-mode="review" onclick="setMode('review')">Repaso<span class="count" id="mc-review"></span></button>
  </div>

  <div class="topic-bar" id="topic-bar"></div>
  <div class="card-area" id="card-area">
    <div class="empty-state"><div class="big">📚</div>Importa un JSON con tu vocabulario para empezar.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'vocab_progress_v2';
const VOCAB_KEY   = 'vocab_data_v2';

let vocab = [], progress = {}, currentDeck = [], currentIdx = 0, currentMode = 'all', currentTopic = 'all', flipped = false;

function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { progress = {}; }
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e) {}
}
function saveVocab(data) {
  try { localStorage.setItem(VOCAB_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadSavedVocab() {
  try { const d = localStorage.getItem(VOCAB_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function confirmReset() {
  if (confirm('¿Borrar todo el progreso? Las palabras no se eliminarán.')) {
    progress = {};
    saveProgress();
    updateGlobalStats();
    updateModeCounts();
    renderCard();
    showToast('Progreso borrado');
  }
}

function loadData(data) {
  vocab = data.vocabulary || (Array.isArray(data) ? data : []);
  saveVocab(data);
  buildTopics();
  updateGlobalStats();
  updateDeck();
}

function buildTopics() {
  const topics = ['all', ...new Set(vocab.map(v => v.topic).filter(Boolean))];
  document.getElementById('topic-bar').innerHTML = topics.map(t =>
    `<button class="topic-btn${t===currentTopic?' active':''}" onclick="setTopic('${t}')">${t==='all'?'Todos':t}</button>`
  ).join('');
}

function setTopic(t) { currentTopic = t; buildTopics(); updateDeck(); }
function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode===m));
  updateDeck();
}

function filteredVocab() {
  return currentTopic === 'all' ? vocab : vocab.filter(v => v.topic === currentTopic);
}

function updateDeck() {
  const base = filteredVocab();
  if (currentMode === 'hard')   currentDeck = base.filter(v => progress[v.word]==='hard' || progress[v.word]==='no');
  else if (currentMode === 'review') currentDeck = base.filter(v => progress[v.word]==='known');
  else currentDeck = [...base].sort((a,b) => {
    const o = {no:0, hard:1, undefined:2, known:3};
    return (o[progress[a.word]]??2) - (o[progress[b.word]]??2);
  });
  currentIdx = 0; flipped = false;
  updateModeCounts();
  renderCard();
}

function updateGlobalStats() {
  const total  = vocab.length;
  const known  = vocab.filter(v => progress[v.word]==='known').length;
  const hard   = vocab.filter(v => progress[v.word]==='hard').length;
  const no     = vocab.filter(v => progress[v.word]==='no').length;
  const newW   = total - known - hard - no;

  document.getElementById('g-total').textContent = total;
  document.getElementById('g-known').textContent = known;
  document.getElementById('g-hard').textContent  = hard;
  document.getElementById('g-no').textContent    = no;
  document.getElementById('g-new').textContent   = newW;

  const pct = n => total ? Math.round((n/total)*100) + '%' : '0%';
  document.getElementById('gp-known').style.width = pct(known);
  document.getElementById('gp-hard').style.width  = pct(hard);
  document.getElementById('gp-no').style.width    = pct(no);
}

function updateModeCounts() {
  const base = filteredVocab();
  document.getElementById('mc-all').textContent    = '\n' + base.length + ' cards';
  document.getElementById('mc-hard').textContent   = '\n' + base.filter(v=>progress[v.word]==='hard'||progress[v.word]==='no').length + ' cards';
  document.getElementById('mc-review').textContent = '\n' + base.filter(v=>progress[v.word]==='known').length + ' cards';
}

function typeClass(t) { return ({verb:'type-verb',noun:'type-noun',adj:'type-adj',adv:'type-adv',phrase:'type-phrase'}[t]||'type-noun'); }
function typeName(t)  { return ({verb:'verbo',noun:'sustantivo',adj:'adjetivo',adv:'adverbio',phrase:'frase'}[t]||t||''); }

function statusIcon(w) {
  const s = progress[w];
  if (s==='known') return '<div class="status-icon status-known" title="Sabida">✓</div>';
  if (s==='hard')  return '<div class="status-icon status-hard"  title="Difícil">~</div>';
  if (s==='no')    return '<div class="status-icon status-no"    title="No sé">✗</div>';
  return '';
}

function renderCard() {
  const area = document.getElementById('card-area');
  if (!currentDeck.length) {
    const msgs = {
      hard:   '¡No tienes palabras marcadas como difíciles en este tema! 🎉',
      review: 'Aún no has acertado ninguna en este tema. ¡Ánimo!',
      all:    vocab.length ? 'No hay palabras para este filtro.' : 'Importa un JSON con tu vocabulario para empezar.'
    };
    area.innerHTML = `<div class="empty-state"><div class="big">${currentMode==='hard'?'🎉':'📚'}</div>${msgs[currentMode]}</div>`;
    return;
  }

  const card = currentDeck[currentIdx];
  const pct  = Math.round((currentIdx / currentDeck.length) * 100);

  area.innerHTML = `
    <div class="progress-line">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${currentIdx+1} / ${currentDeck.length}</span>
    </div>
    <div class="card-wrap" id="the-card" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-face">
          ${statusIcon(card.word)}
          <div class="card-tag">${card.topic||''}</div>
          <div class="card-word">${card.word}</div>
          ${card.phonetic ? `<div class="card-phonetic">${card.phonetic}</div>` : ''}
          <div class="card-hint">Toca para ver la traducción</div>
        </div>
        <div class="card-face card-back">
          ${statusIcon(card.word)}
          <span class="card-type ${typeClass(card.type)}">${typeName(card.type)}</span>
          <div class="card-translation">${card.translation}</div>
          ${card.example ? `<div class="card-example">"${card.example}"</div>` : ''}
        </div>
      </div>
    </div>
    <div class="action-btns-wrap" id="action-area">
      <button class="reveal-btn" onclick="flipCard()">Ver traducción</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()" ${currentIdx===0?'disabled':''}>← Anterior</button>
      <button class="nav-btn" onclick="nextCard()" ${currentIdx===currentDeck.length-1?'disabled':''}>Siguiente →</button>
    </div>`;
}

function flipCard() {
  const wrap = document.getElementById('the-card');
  if (!wrap) return;
  flipped = !flipped;
  wrap.classList.toggle('flipped', flipped);
  document.getElementById('action-area').innerHTML = flipped
    ? `<div class="action-row">
        <button class="action-btn btn-no"   onclick="rate('no')">✗<span class="btn-label">No sé</span></button>
        <button class="action-btn btn-hard" onclick="rate('hard')">~<span class="btn-label">Difícil</span></button>
        <button class="action-btn btn-yes"  onclick="rate('known')">✓<span class="btn-label">Lo sé</span></button>
       </div>`
    : `<button class="reveal-btn" onclick="flipCard()">Ver traducción</button>`;
}

function rate(val) {
  const word = currentDeck[currentIdx].word;
  const prev = progress[word];
  progress[word] = val;
  saveProgress();
  updateGlobalStats();
  updateModeCounts();

  setTimeout(() => {
    // En modo fallos, recalcular el deck para quitar las que ya se saben
    if (currentMode === 'hard') {
      updateDeck();
      return;
    }
    // En todos los demás modos (incluido repaso), avanzar a la siguiente
    if (currentIdx < currentDeck.length - 1) {
      currentIdx++; flipped = false; renderCard();
    } else {
      const known = vocab.filter(v => progress[v.word]==='known').length;
      document.getElementById('card-area').innerHTML = `
        <div class="empty-state">
          <div class="big">🎯</div>
          <b>¡Ronda completada!</b><br><br>
          ${known} de ${vocab.length} palabras dominadas en total.<br><br>
          <button class="nav-btn" style="margin:0 auto;display:block;padding:10px 24px" onclick="updateDeck()">Repetir</button>
        </div>`;
    }
  }, 200);
}

function nextCard() { if (currentIdx < currentDeck.length-1) { currentIdx++; flipped=false; renderCard(); } }
function prevCard() { if (currentIdx > 0)                    { currentIdx--; flipped=false; renderCard(); } }

document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      loadData(JSON.parse(ev.target.result));
      showToast('Vocabulario cargado ✓');
    } catch(err) { alert('JSON inválido — revisa el formato.'); }
  };
  r.readAsText(f); e.target.value = '';
});

// Init
loadProgress();
const saved = loadSavedVocab();
if (saved) {
  loadData(saved);
} else {
  fetch('vocab.json')
    .then(r => r.json())
    .then(data => loadData(data))
    .catch(() => {
      document.getElementById('card-area').innerHTML =
        `<div class="empty-state"><div class="big">📚</div>Importa un JSON con tu vocabulario para empezar.</div>`;
      updateGlobalStats();
      updateModeCounts();
    });
}
</script>
</body>
</html>
